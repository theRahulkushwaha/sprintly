services:
  backend:
    build: ./backend
    container_name: sprintly-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        
        VITE_API_URL: http://localhost:5000/api
    container_name: sprintly-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped